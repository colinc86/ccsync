profiles:
  default:
    description: "Primary config"

# v0.9.0 stopped syncing whole config files. ~/.claude.json and
# ~/.claude/settings.json still get touched, but only via the
# managed JSON-slice files in internal/mcpextract — not via the
# jsonFiles allow/exclude/redact path. The block below stays empty
# by default; per-profile rules can still appear here for any
# JSON files a user genuinely wants to sync wholesale.
jsonFiles: {}

# .syncignore is layered on top of the explicit content roots.
# Each tracked directory (agents/, skills/, commands/, hooks/,
# output-styles/, memory/) is walked, then this matcher trims
# scratch the user almost certainly doesn't want shipping over
# the wire (editor backups, OS-meta files). It's intentionally
# tiny — the v0.8.x era of long exclusion lists is over now that
# we don't try to sync the whole ~/.claude tree.
defaultSyncignore: |
  .DS_Store
  *.bak
  *.swp
  Thumbs.db
